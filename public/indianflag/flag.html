<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jay Hind</title>

    <link href="../indianflag/flag.css" rel="stylesheet" />
    <link rel="icon" href="../favv.png" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="background-video">
      <video autoplay muted loop id="bg-video">
        <source
          src="https://media.istockphoto.com/id/1503396346/video/happy-indian-republic-day-creative-flag-design-background.mp4?s=mp4-640x640-is&k=20&c=sScbw69iYMiOdC9_KZ2L12EL43ke3lsggE9aK7StIt4="
          type="video/mp4"
        />
        Your browser does not support HTML5 video.
      </video>
    </div>

    <div class="wrapper">

      <div class="flag-assembly">
        <div class="bar">
          <div class="bar-1"></div>
          <div class="bar-2"></div>
          <div class="bar-3"></div>
        </div>

        <div class="flag">
          <div class="top"></div>

          <div class="middle">
            <img
              src="../indianflag/img/ashokchakr.gif"
              alt="Ashoka Chakra"
            />
          </div>

          <div class="bottom"></div>
        </div>
      </div>

      <div class="quote-container">
        <div class="image-wrapper">
          <img id="patriot-image" src="" alt="Patriot Image" />
        </div>

        <div class="quote">
          "Give me blood and I will give you freedom."
        </div>

        <div class="author">- Subhas Chandra Bose</div>

        <div class="quote-nav">
          <button id="prev-quote">&#8592;</button>
          <button id="next-quote">&#8594;</button>
        </div>
      </div>
    </div>

    <div class="music-controls">
      <audio id="bgMusic" controls autoplay loop>
        <source src="vande_mataram.mp3" type="audio/mpeg">
      </audio>
    </div>

    <script>
      // Quotes data
      const quotes = [
        {
          text: '"Give me blood and I will give you freedom."',
          author: "- Subhas Chandra Bose",
          image: "./img/subhas_bose.png",
        },
        {
          text: '"Swaraj is my birthright and I shall have it."',
          author: "- Bal Gangadhar Tilak",
          image: "./img/bal_tilak.png",
        },
        {
          text: '"Inquilab Zindabad."',
          author: "- Bhagat Singh",
          image: "./img/bhagat_singh.jpg",
        },
        {
          text: '"Jai Jawan Jai Kisan."',
          author: "- Lal Bahadur Shastri",
          image: "./img/lal_bahadur.png",
        },
        {
          text: '"Jai Hind!"',
          author: "- Netaji Subhas Chandra Bose",
          image: "./img/subhas_bose.png",
        },
        {
          text: '"Sarfaroshi ki tamanna ab hamare dil mein hai."',
          author: "- Ram Prasad Bismil",
          image: "./img/ram_prasad.png",
        },
        {
          text:
            '"Dushman ki goliyon ka hum samna karenge, Azad hee rahein hain, azad hee rahenge."',
          author: "- Chandrashekhar Azad",
          image: "./img/azad.png",
        },
        {
          text: '"Satyameva Jayate."',
          author: "- Pandit Madan Mohan Malaviya",
          image: "./img/pandit_madan_mohan.webp",
        },
        {
          text: '"Sarvodaya, Samaj Sudharak, Samaj Sevak."',
          author: "- Mahatma Gandhi",
          image: "./img/gandhi.png",
        },
        {
          text: '"Karo ya maro."',
          author: "- Mahatma Gandhi",
          image: "./img/gandhi.png",
        },
      ];

      let currentQuoteIndex = 0;

      const quoteText = document.querySelector(".quote");
      const quoteAuthor = document.querySelector(".author");
      const patriotImage = document.getElementById("patriot-image");

      function displayQuote() {
        quoteText.textContent = quotes[currentQuoteIndex].text;
        quoteAuthor.textContent = quotes[currentQuoteIndex].author;
        patriotImage.src = quotes[currentQuoteIndex].image;
        patriotImage.alt = quotes[currentQuoteIndex].author;
      }

      displayQuote();

      setInterval(() => {
        currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
        displayQuote();
      }, 5000);

      document.getElementById("prev-quote").addEventListener("click", () => {
        currentQuoteIndex =
          (currentQuoteIndex - 1 + quotes.length) % quotes.length;
        displayQuote();
      });

      document.getElementById("next-quote").addEventListener("click", () => {
        currentQuoteIndex =
          (currentQuoteIndex + 1) % quotes.length;
        displayQuote();
      });

      const music = document.getElementById("bgMusic");

      window.addEventListener("load", () => {
        music.play().catch(() => {
          console.log("Autoplay blocked by browser");
        });
      });
    </script>

     <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey of the Indian Flag</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Background Ashoka Wheel Watermark -->
  <svg class="bg-wheel" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="100" cy="100" r="15" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="100" cy="100" r="8"  fill="white"/>
    <g id="spokes">
      <line x1="100" y1="15"  x2="100" y2="85"  stroke="white" stroke-width="1.8"/>
      <line x1="100" y1="115" x2="100" y2="185" stroke="white" stroke-width="1.8"/>
    </g>
    <use href="#spokes" transform="rotate(15  100 100)"/>
    <use href="#spokes" transform="rotate(30  100 100)"/>
    <use href="#spokes" transform="rotate(45  100 100)"/>
    <use href="#spokes" transform="rotate(60  100 100)"/>
    <use href="#spokes" transform="rotate(75  100 100)"/>
    <use href="#spokes" transform="rotate(90  100 100)"/>
    <use href="#spokes" transform="rotate(105 100 100)"/>
    <use href="#spokes" transform="rotate(120 100 100)"/>
    <use href="#spokes" transform="rotate(135 100 100)"/>
    <use href="#spokes" transform="rotate(150 100 100)"/>
    <use href="#spokes" transform="rotate(165 100 100)"/>
  </svg>

  <!-- Page Header -->
  <header class="page-header">
    <h1>The Journey of the Indian Flag</h1>
    <p>From colonial resistance to sovereign pride — six flags, forty-one years</p>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-dot"></div>
      <div class="ornament-line right"></div>
    </div>
  </header>

  <!-- Timeline Strip -->
  <div class="timeline-strip" id="timeline"></div>

  <!-- Main Card -->
  <div class="card-container">
    <div class="flag-card card-top-corners" id="flagCard">

      <!-- Card content injected by JS -->
      <div class="card-inner" id="cardInner"></div>

      <!-- Navigation -->
      <div class="nav-row">
        <button class="nav-btn"      id="prevBtn" onclick="navigate(-1)">← Previous</button>
        <button class="nav-btn next" id="nextBtn" onclick="navigate(1)">Next →</button>
      </div>

      <!-- Progress Dots -->
      <div class="progress-dots" id="progressDots"></div>

      <!-- Counter -->
      <p class="counter" id="counter"></p>

    </div>
  </div>

  <script src="script.js"></script>
  </body>
  </html>
  </body>
</html>
